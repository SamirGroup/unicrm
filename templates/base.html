<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCRM AI - {% block title %}Dashboard{% endblock %}</title>
    
    <!-- Tailwind CSS + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.css" rel="stylesheet" type="text/css" />
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body x-data="{ sidebarOpen: true, darkMode: false }" :class="{'dark': darkMode}" class="bg-gray-50 dark:bg-gray-900">
    
    <!-- Navbar -->
    {% include 'includes/navbar.html' %}
    
    <!-- Sidebar -->
    {% include 'includes/sidebar.html' %}
    
    <!-- Main Content -->
    <div class="lg:pl-64">
        <main class="p-4 md:p-6">
            <div id="main-content" hx-target="this" hx-swap="outerHTML">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <!-- Toaster / Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50"></div>
    
    {% load static %}
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
