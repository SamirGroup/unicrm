{% extends 'admin_panel/base.html' %}
{% block title %}Modul tahrirlash{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'admin_panel:modules' %}" class="btn btn-ghost btn-sm gap-2">
        <i class="fas fa-arrow-left"></i>
        Orqaga
    </a>
    <h1 class="text-3xl font-bold mt-2">Modulni tahrirlash</h1>
    <p class="text-base-content/70">{{ module.name }}</p>
</div>

<div class="card bg-base-100 shadow-xl max-w-2xl">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text">Modul nomi *</span>
                </label>
                <input type="text" name="name" class="input input-bordered" 
                       value="{{ module.name }}" required>
            </div>
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text">Modul turi (kod) *</span>
                </label>
                <input type="text" class="input input-bordered" 
                       value="{{ module.module_type }}" disabled>
                <label class="label">
                    <span class="label-text-alt">Tizim kodi - o'zgartirib bo'lmaydi</span>
                </label>
            </div>
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text">Narxi (so'm) *</span>
                </label>
                <input type="number" name="price" class="input input-bordered" 
                       value="{{ module.price }}" required>
            </div>
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text">Tavsif</span>
                </label>
                <textarea name="description" class="textarea textarea-bordered h-24">{{ module.description }}</textarea>
            </div>
            
            <div class="form-control mb-6">
                <label class="label cursor-pointer justify-start gap-3">
                    <input type="checkbox" name="is_active" class="checkbox checkbox-primary" 
                           {% if module.is_active %}checked{% endif %}>
                    <span class="label-text font-semibold">Modul faol</span>
                </label>
            </div>
            
            <div class="flex justify-end gap-4">
                <a href="{% url 'admin_panel:modules' %}" class="btn btn-ghost">
                    Bekor qilish
                </a>
                <button type="submit" class="btn btn-primary gap-2">
                    <i class="fas fa-save"></i>
                    Saqlash
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
